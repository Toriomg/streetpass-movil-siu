<!DOCTYPE html>
<html lang="es">
<head>

    <title>Streetpass SIU</title>
    <link rel="stylesheet" href="style.css">
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

        <div id="lista-pendientes">

        </div>
    </div>

    <script src="script.js"></script>
